<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P WebRTC Calling System</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #16a34a;
            --danger: #dc2626;
            --dark: #1f2937;
            --light: #f3f4f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #38bdf8; }
        
        .id-badge { background: #334155; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.95rem; }
        .id-num { color: #f43f5e; letter-spacing: 1px; }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media(max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }

        .panel { background: #111827; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        h2 { font-size: 1.1rem; margin-bottom: 15px; color: #94a3b8; border-bottom: 1px solid #1f2937; padding-bottom: 5px; }

        input, button, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: none; outline: none; }
        input, select { background: #1f2937; color: white; border: 1px solid #475569; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-hover); }
        
        .btn-call { background: var(--success); }
        .btn-call:hover { background: #15803d; }
        .btn-hangup { background: var(--danger); display: none; }
        .btn-hangup:hover { background: #b91c1c; }

        .list-container { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #1f2937; padding: 8px 12px; margin-bottom: 6px; border-radius: 4px; font-size: 0.9rem; }
        .list-item button { width: auto; margin: 0; padding: 4px 10px; font-size: 0.8rem; }

        /* Video Call overlay/container */
        .video-box { text-align: center; margin-bottom: 15px; background: #000; border-radius: 8px; overflow: hidden; position: relative; height: 220px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .local-video-small { position: absolute; bottom: 10px; right: 10px; width: 80px; height: 60px; border: 2px solid white; border-radius: 4px; z-index: 10; }
        
        .status-bar { text-align: center; padding: 8px; margin-bottom: 15px; border-radius: 6px; font-weight: bold; background: #334155; font-size: 0.9rem; }
        .incoming-ui { display: none; background: #2e1065; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; border: 1px solid #7c3aed; }
        .incoming-ui div { margin-bottom: 10px; font-weight: bold; }
        .inc-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>P2P WebRTC Phone</h1>
        <div class="id-badge">Your ID: <span id="my-id-display" class="id-num">Initializing...</span></div>
    </header>

    <div class="incoming-ui" id="incoming-panel">
        <div id="incoming-msg">Incoming Call from 0000...</div>
        <div class="inc-buttons">
            <button class="btn-call" onclick="answerCall()">Answer</button>
            <button class="btn-hangup" style="display:inline-block;" onclick="rejectCall()">Decline</button>
        </div>
    </div>

    <div class="status-bar" id="status-text">Status: Setting up signaling stream...</div>

    <div class="main-layout">
        <div>
            <div class="video-box">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" class="local-video-small" autoplay playsinline muted></video>
            </div>

            <div class="panel">
                <h2>Make a Call</h2>
                <input type="text" id="target-id" placeholder="Enter 4-Digit ID to Call" maxlength="4">
                <button class="btn-call" id="btn-dial" onclick="startCall()">Dial</button>
                <button class="btn-hangup" id="btn-hangup" onclick="hangUp()">Hang Up</button>
            </div>
        </div>

        <div>
            <div class="panel" style="margin-bottom: 20px;">
                <h2>Add Contact</h2>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="contact-name" placeholder="Name" style="flex: 2;">
                    <input type="text" id="contact-id" placeholder="4-Digit ID" maxlength="4" style="flex: 1;">
                </div>
                <button onclick="addContact()">Save Contact</button>
                
                <div class="list-container" id="contacts-list"></div>
            </div>

            <div class="panel">
                <h2>Call History</h2>
                <div class="list-container" id="history-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // System Constants & App Namespace Prefix to prevent collisions on the public PeerJS server
    const APP_PREFIX = "rtc-call-sys-";
    
    let peer;
    let localStream;
    let currentCall = null;
    let incomingCallInstance = null;
    let audioContext = null;
    let ringtoneInterval = null;

    // Load or generate a permanent 4-digit ID
    let myPermanentId = localStorage.getItem('phone_p2p_id');
    if (!myPermanentId) {
        myPermanentId = Math.floor(1000 + Math.random() * 9000).toString();
        localStorage.setItem('phone_p2p_id', myPermanentId);
    }
    document.getElementById('my-id-display').innerText = myPermanentId;

    // Initialize lists from localStorage
    let contacts = JSON.parse(localStorage.getItem('phone_contacts')) || [];
    let callHistory = JSON.parse(localStorage.getItem('phone_history')) || [];

    // Initialize PeerJS
    function initPeer() {
        // Connecting to free public PeerJS cloud signaling routing tier
        peer = new Peer(APP_PREFIX + myPermanentId);

        peer.on('open', (id) => {
            updateStatus("Status: Ready to receive/make calls.");
        });

        peer.on('error', (err) => {
            console.error(err);
            if(err.type === 'unavailable-id') {
                updateStatus("ID Error: Your ID is currently occupied elsewhere.");
            } else {
                updateStatus("Error: " + err.type);
            }
        });

        // Handling an Incoming Media Stream Request
        peer.on('call', (call) => {
            incomingCallInstance = call;
            const callerId = call.peer.replace(APP_PREFIX, "");
            document.getElementById('incoming-msg').innerText = `Incoming Call from ID: ${callerId}`;
            document.getElementById('incoming-panel').style.display = 'block';
            updateStatus("Status: Ringing...");
            playRingtone(true);
        });
    }

    // Capture Local Camera/Microphone Inputs
    async function getMediaStream() {
        if (localStream) return localStream;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            return localStream;
        } catch (err) {
            updateStatus("Media Error: Cannot access camera/microphone.");
            throw err;
        }
    }

    // Outbound Dial Strategy
    async function startCall() {
        const targetId = document.getElementById('target-id').value.trim();
        if (targetId.length !== 4 || isNaN(targetId)) {
            alert("Please provide a valid 4-digit numeric destination ID.");
            return;
        }
        if (targetId === myPermanentId) {
            alert("You cannot call your own ID!");
            return;
        }

        updateStatus(`Status: Dialing ${targetId}...`);
        playRingtone(false); // Ring-back Tone loop

        try {
            const stream = await getMediaStream();
            const fullPeerId = APP_PREFIX + targetId;
            
            currentCall = peer.call(fullPeerId, stream);
            addToHistory(targetId, "Outgoing");

            // Toggle Control Mechanics
            document.getElementById('btn-dial').style.display = 'none';
            document.getElementById('btn-hangup').style.display = 'block';

            currentCall.on('stream', (remoteStream) => {
                stopRingtone();
                updateStatus("Status: Connected");
                document.getElementById('remote-video').srcObject = remoteStream;
            });

            currentCall.on('close', () => {
                handleCallCleanup();
            });

        } catch (err) {
            stopRingtone();
            updateStatus("Status: Call Initiation Aborted.");
        }
    }

    // Inbound Call Mechanics
    async function answerCall() {
        if (!incomingCallInstance) return;
        stopRingtone();
        document.getElementById('incoming-panel').style.display = 'none';
        updateStatus("Status: Connecting stream...");

        try {
            const stream = await getMediaStream();
            incomingCallInstance.answer(stream);
            currentCall = incomingCallInstance;
            
            const callerId = currentCall.peer.replace(APP_PREFIX, "");
            addToHistory(callerId, "Incoming (Answered)");

            document.getElementById('btn-dial').style.display = 'none';
            document.getElementById('btn-hangup').style.display = 'block';

            currentCall.on('stream', (remoteStream) => {
                updateStatus("Status: Connected");
                document.getElementById('remote-video').srcObject = remoteStream;
            });

            currentCall.on('close', () => {
                handleCallCleanup();
            });
        } catch (err) {
            handleCallCleanup();
        }
    }

    function rejectCall() {
        if (incomingCallInstance) {
            const callerId = incomingCallInstance.peer.replace(APP_PREFIX, "");
            addToHistory(callerId, "Missed / Rejected");
            incomingCallInstance.close();
        }
        stopRingtone();
        document.getElementById('incoming-panel').style.display = 'none';
        updateStatus("Status: Ready to receive/make calls.");
    }

    function hangUp() {
        if (currentCall) currentCall.close();
        handleCallCleanup();
    }

    function handleCallCleanup() {
        stopRingtone();
        if (currentCall) currentCall = null;
        incomingCallInstance = null;
        
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('btn-dial').style.display = 'block';
        document.getElementById('btn-hangup').style.display = 'none';
        document.getElementById('incoming-panel').style.display = 'none';
        updateStatus("Status: Call Ended.");
    }

    function updateStatus(text) {
        document.getElementById('status-text').innerText = text;
    }

    // Synthetic Ringtone Generator using Web Audio API
    function playRingtone(isIncoming) {
        stopRingtone();
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const triggerTone = () => {
            if (!audioContext) return;
            let osc1 = audioContext.createOscillator();
            let osc2 = audioContext.createOscillator();
            let gainNode = audioContext.createGain();

            osc1.type = 'sine';
            osc2.type = 'sine';
            
            if (isIncoming) {
                // High-Pitch Dual Telephone Cadence for Incoming Calls
                osc1.frequency.setValueAtTime(440, audioContext.currentTime);
                osc2.frequency.setValueAtTime(480, audioContext.currentTime);
            } else {
                // Low Standard American Ring-back Tone cadence for Outgoing Call status
                osc1.frequency.setValueAtTime(440, audioContext.currentTime);
                osc2.frequency.setValueAtTime(480, audioContext.currentTime);
            }

            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + (isIncoming ? 1.2 : 1.8));

            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioContext.destination);

            osc1.start();
            osc2.start();
            osc1.stop(audioContext.currentTime + (isIncoming ? 1.2 : 1.8));
            osc2.stop(audioContext.currentTime + (isIncoming ? 1.2 : 1.8));
        };

        triggerTone();
        ringtoneInterval = setInterval(triggerTone, isIncoming ? 2500 : 4000);
    }

    function stopRingtone() {
        if (ringtoneInterval) {
            clearInterval(ringtoneInterval);
            ringtoneInterval = null;
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
    }

    // Contacts & History System (Persistence Layers)
    function addContact() {
        const name = document.getElementById('contact-name').value.trim();
        const id = document.getElementById('contact-id').value.trim();

        if(!name || id.length !== 4 || isNaN(id)) {
            alert("Provide a clean display name and a 4-digit ID.");
            return;
        }

        contacts.push({ name, id });
        localStorage.setItem('phone_contacts', JSON.stringify(contacts));
        
        document.getElementById('contact-name').value = '';
        document.getElementById('contact-id').value = '';
        renderContacts();
    }

    function removeContact(index) {
        contacts.splice(index, 1);
        localStorage.setItem('phone_contacts', JSON.stringify(contacts));
        renderContacts();
    }

    function quickDial(id) {
        document.getElementById('target-id').value = id;
        startCall();
    }

    function addToHistory(id, type) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const matchingContact = contacts.find(c => c.id === id);
        const displayName = matchingContact ? `${matchingContact.name} (${id})` : `ID: ${id}`;
        
        callHistory.unshift({ displayName, type, time });
        if (callHistory.length > 20) callHistory.pop(); // Cap history length
        localStorage.setItem('phone_history', JSON.stringify(callHistory));
        renderHistory();
    }

    function renderContacts() {
        const container = document.getElementById('contacts-list');
        container.innerHTML = contacts.length === 0 ? '<div style="font-size:0.85rem;color:#64748b;">No contacts saved.</div>' : '';
        contacts.forEach((c, index) => {
            container.innerHTML += `
                <div class="list-item">
                    <span><strong>${c.name}</strong> (${c.id})</span>
                    <div>
                        <button class="btn-call" onclick="quickDial('${c.id}')">Call</button>
                        <button class="btn-hangup" style="display:inline-block;" onclick="removeContact(${index})">X</button>
                    </div>
                </div>`;
        });
    }

    function renderHistory() {
        const container = document.getElementById('history-list');
        container.innerHTML = callHistory.length === 0 ? '<div style="font-size:0.85rem;color:#64748b;">No recent activity logs.</div>' : '';
        callHistory.forEach(h => {
            container.innerHTML += `
                <div class="list-item">
                    <span>${h.displayName} <br><small style="color:#64748b;">${h.type}</small></span>
                    <span style="font-size:0.8rem; color:#94a3b8;">${h.time}</span>
                </div>`;
        });
    }

    // App Initialization Triggers
    initPeer();
    renderContacts();
    renderHistory();
</script>
</body>
</html>
