<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P WebRTC Call Hub</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #16a34a;
            --danger: #dc2626;
            --dark: #111827;
            --light: #f3f4f6;
            --scale-factor: 1; /* Recalculated dynamically by the resize agent */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            padding: calc(20px * var(--scale-factor)); 
            display: flex; 
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        
        .container { 
            width: 100%; 
            max-width: 1000px; 
            background: #1e293b; 
            padding: calc(24px * var(--scale-factor)); 
            border-radius: calc(12px * var(--scale-factor)); 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); 
            transition: all 0.15s ease-out;
        }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #334155; 
            padding-bottom: calc(15px * var(--scale-factor)); 
            margin-bottom: calc(20px * var(--scale-factor)); 
        }
        h1 { font-size: calc(1.5rem * var(--scale-factor)); color: #38bdf8; }
        
        .id-badge { 
            background: #334155; 
            padding: calc(6px * var(--scale-factor)) calc(12px * var(--scale-factor)); 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: calc(0.9rem * var(--scale-factor)); 
        }
        .id-num { color: #f43f5e; letter-spacing: 1px; }

        .permission-banner {
            background: #1e1b4b;
            border: 1px solid #4338ca;
            padding: calc(12px * var(--scale-factor));
            border-radius: calc(8px * var(--scale-factor));
            margin-bottom: calc(15px * var(--scale-factor));
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .permission-banner span { font-size: calc(0.85rem * var(--scale-factor)); color: #c7d2fe; }
        .btn-perm { width: auto; padding: 6px 15px; font-size: calc(0.8rem * var(--scale-factor)); margin-bottom: 0; }

        .main-layout { 
            display: grid; 
            grid-template-columns: 1.2fr 1fr; 
            gap: calc(20px * var(--scale-factor)); 
        }
        
        @media(max-width: 768px) { 
            .main-layout { grid-template-columns: 1fr; } 
        }

        .panel { 
            background: var(--dark); 
            padding: calc(15px * var(--scale-factor)); 
            border-radius: calc(8px * var(--scale-factor)); 
            border: 1px solid #334155; 
            margin-bottom: calc(15px * var(--scale-factor));
        }
        h2 { 
            font-size: calc(1.05rem * var(--scale-factor)); 
            margin-bottom: calc(12px * var(--scale-factor)); 
            color: #94a3b8; 
            border-bottom: 1px solid #1f2937; 
            padding-bottom: calc(5px * var(--scale-factor)); 
        }

        label {
            display: block;
            font-size: calc(0.8rem * var(--scale-factor));
            color: #94a3b8;
            margin-bottom: 4px;
        }

        input, button, select { 
            width: 100%; 
            padding: calc(10px * var(--scale-factor)); 
            margin-bottom: calc(10px * var(--scale-factor)); 
            border-radius: calc(6px * var(--scale-factor)); 
            font-size: calc(0.9rem * var(--scale-factor));
            border: none; 
            outline: none; 
        }
        input, select { background: #1f2937; color: white; border: 1px solid #475569; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.15s; }
        button:hover { background: var(--primary-hover); }
        
        .btn-call { background: var(--success); }
        .btn-call:hover { background: #15803d; }
        .btn-hangup { background: var(--danger); display: none; }
        .btn-hangup:hover { background: #b91c1c; }

        .list-container { 
            max-height: calc(160px * var(--scale-factor)); 
            overflow-y: auto; 
            margin-top: calc(8px * var(--scale-factor)); 
        }
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #1f2937; 
            padding: calc(8px * var(--scale-factor)) calc(12px * var(--scale-factor)); 
            margin-bottom: calc(6px * var(--scale-factor)); 
            border-radius: calc(4px * var(--scale-factor)); 
            font-size: calc(0.85rem * var(--scale-factor)); 
        }
        .list-item button { width: auto; margin: 0; padding: 4px 8px; font-size: calc(0.75rem * var(--scale-factor)); }

        .video-box { 
            text-align: center; 
            margin-bottom: calc(15px * var(--scale-factor)); 
            background: #000; 
            border-radius: calc(8px * var(--scale-factor)); 
            overflow: hidden; 
            position: relative; 
            height: calc(230px * var(--scale-factor)); 
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .local-video-small { 
            position: absolute; 
            bottom: 10px; 
            right: 10px; 
            width: calc(80px * var(--scale-factor)); 
            height: calc(60px * var(--scale-factor)); 
            border: 2px solid white; 
            border-radius: 4px; 
            z-index: 10; 
        }
        
        .status-bar { 
            text-align: center; 
            padding: calc(8px * var(--scale-factor)); 
            margin-bottom: calc(15px * var(--scale-factor)); 
            border-radius: calc(6px * var(--scale-factor)); 
            font-weight: bold; 
            background: #334155; 
            font-size: calc(0.85rem * var(--scale-factor)); 
        }
        .incoming-ui { 
            display: none; 
            background: #2e1065; 
            padding: calc(15px * var(--scale-factor)); 
            border-radius: calc(8px * var(--scale-factor)); 
            margin-bottom: calc(15px * var(--scale-factor)); 
            text-align: center; 
            border: 1px solid #7c3aed; 
        }
        .incoming-ui div { margin-bottom: calc(10px * var(--scale-factor)); font-weight: bold; }
        .inc-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <header>
        <h1>P2P WebRTC Phone</h1>
        <div class="id-badge">Your ID: <span id="my-id-display" class="id-num">Initializing...</span></div>
    </header>

    <div class="permission-banner" id="perm-banner">
        <span>Enable system-level notifications to receive calls while backgrounded.</span>
        <button class="btn-perm" onclick="requestPermission()">Allow Notifications</button>
    </div>

    <div class="incoming-ui" id="incoming-panel">
        <div id="incoming-msg">Incoming Call...</div>
        <div class="inc-buttons">
            <button class="btn-call" onclick="answerCall()">Answer</button>
            <button class="btn-hangup" style="display:inline-block;" onclick="rejectCall()">Decline</button>
        </div>
    </div>

    <div class="status-bar" id="status-text">Status: Setting up signaling stream...</div>

    <div class="main-layout">
        <div>
            <div class="video-box">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" class="local-video-small" autoplay playsinline muted></video>
            </div>

            <div class="panel">
                <h2>Make a Call</h2>
                <input type="text" id="target-id" placeholder="Enter 4-Digit ID to Call" maxlength="4">
                <button class="btn-call" id="btn-dial" onclick="startCall()">Dial</button>
                <button class="btn-hangup" id="btn-hangup" onclick="hangUp()">Hang Up</button>
            </div>
            
            <div class="panel" id="ringtone-panel">
                <h2>Ringtone Settings (Android & Desktop Only)</h2>
                <label for="ringtone-select">Choose Custom Soundscape</label>
                <select id="ringtone-select">
                    <option value="classic">Retro Telephone Ring</option>
                    <option value="pulse">Space Pulsar</option>
                    <option value="beacon">Sonar Beacon</option>
                    <option value="chirp">Techno Bird Chirp</option>
                    <option value="melody">Synthesizer Arpeggio</option>
                    <option value="siren">Emergency Pulse</option>
                    <option value="digital">Digital Clock Alarm</option>
                    <option value="harmonic">Zen Harmonic</option>
                    <option value="marimba">Electro Marimba</option>
                    <option value="bounce">Bouncy Synthesizer</option>
                </select>
            </div>
        </div>

        <div>
            <div class="panel">
                <h2>Add Contact</h2>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="contact-name" placeholder="Name" style="flex: 2;">
                    <input type="text" id="contact-id" placeholder="ID" maxlength="4" style="flex: 1;">
                </div>
                <button onclick="addContact()">Save Contact</button>
                
                <div class="list-container" id="contacts-list"></div>
            </div>

            <div class="panel">
                <h2>Call History</h2>
                <div class="list-container" id="history-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const APP_PREFIX = "rtc-call-sys-";
    
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let incomingCallInstance = null;
    let audioCtx = null;
    let ringtoneInterval = null;

    // Direct platform query logic
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // --- Dynamic Resizing Agent ---
    function runResizeAgent() {
        const w = window.innerWidth;
        let scale = 1.0;
        if (w < 480) {
            scale = 0.8;
        } else if (w < 768) {
            scale = 0.9;
        } else if (w < 1024) {
            scale = 0.95;
        } else {
            scale = 1.05;
        }
        document.documentElement.style.setProperty('--scale-factor', scale);
    }
    window.addEventListener('resize', runResizeAgent);
    window.addEventListener('DOMContentLoaded', runResizeAgent);

    // --- Persisted Storage ---
    let myPermanentId = localStorage.getItem('phone_p2p_id') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('phone_p2p_id', myPermanentId);
    document.getElementById('my-id-display').innerText = myPermanentId;

    let contacts = JSON.parse(localStorage.getItem('phone_contacts')) || [];
    let callHistory = JSON.parse(localStorage.getItem('phone_history')) || [];

    // --- Notification Permissions Engine ---
    function checkNotificationStatus() {
        if (!("Notification" in window)) {
            document.getElementById('perm-banner').style.display = 'none';
            return;
        }
        if (Notification.permission === 'granted' || Notification.permission === 'denied') {
            document.getElementById('perm-banner').style.display = 'none';
        }
    }

    async function requestPermission() {
        if (!("Notification" in window)) return;
        try {
            const result = await Notification.requestPermission();
            if (result === 'granted') {
                document.getElementById('perm-banner').style.display = 'none';
            }
        } catch (e) {
            console.error("Notification permission request failed", e);
        }
    }

    // Resolves contact identity and pushes system ding alert
    function dispatchCallNotification(callerId) {
        if (!("Notification" in window) || Notification.permission !== "granted") return;

        const matchingContact = contacts.find(c => c.id === callerId);
        // Custom requirements rule: "User (ID) is calling you" or "Contact Name (ID) is calling you"
        const displayName = matchingContact ? `${matchingContact.name} (ID: ${callerId})` : `User (${callerId})`;
        
        const notification = new Notification("Incoming P2P Call", {
            body: `${displayName} is calling you.`,
            tag: "p2p-incoming-call",
            silent: false, // Requests standard system audio alert (native ding)
            requireInteraction: true
        });

        notification.onclick = function() {
            window.focus();
            notification.close();
        };
    }

    // --- PeerJS Protocol Integration ---
    function initPeer() {
        peer = new Peer(APP_PREFIX + myPermanentId);

        peer.on('open', () => {
            updateStatus("Status: Ready to receive/make calls.");
            checkNotificationStatus();
            
            // Reconfigure sound setup if platform is iOS
            if (isIOS) {
                const rPanel = document.getElementById('ringtone-panel');
                if (rPanel) {
                    rPanel.innerHTML = '<h2>Ringtone Settings</h2><p style="font-size:0.8rem;color:#94a3b8;padding:5px 0;">Standard system sounds are used for iOS alerts.</p>';
                }
            }
        });

        peer.on('error', (err) => {
            console.error(err);
            if (err.type === 'peer-unavailable') {
                updateStatus("Error: Target ID is offline or busy.");
                handleCallCleanup();
            } else if (err.type === 'unavailable-id') {
                updateStatus("ID Error: Your ID is currently in use elsewhere.");
            } else {
                updateStatus("System Error: " + err.type);
            }
        });

        peer.on('call', (call) => {
            // Prevent taking calls while already in an active session
            if (currentCall || incomingCallInstance) {
                call.answer();
                setTimeout(() => call.close(), 500);
                return;
            }

            incomingCallInstance = call;
            const callerId = call.peer.replace(APP_PREFIX, "");
            
            const matchingContact = contacts.find(c => c.id === callerId);
            const displayLabel = matchingContact ? `${matchingContact.name} (${callerId})` : `User (${callerId})`;
            
            document.getElementById('incoming-msg').innerText = `Incoming Call: ${displayLabel}`;
            document.getElementById('incoming-panel').style.display = 'block';
            updateStatus("Status: Ringing...");

            dispatchCallNotification(callerId);

            // Execute custom synth only if device is NOT iOS
            if (!isIOS) {
                playPlatformRingtone();
            }
        });
    }

    // --- Media Hardware Access ---
    async function getMediaStream() {
        if (localStream) return localStream;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            return localStream;
        } catch (err) {
            updateStatus("Media Error: Cannot open camera/microphone hardware.");
            throw err;
        }
    }

    // --- Outbound Calling Execution ---
    async function startCall() {
        const targetId = document.getElementById('target-id').value.trim();
        if (targetId.length !== 4 || isNaN(targetId)) {
            alert("Please enter a valid 4-digit numeric ID.");
            return;
        }
        if (targetId === myPermanentId) {
            alert("You cannot call your own device.");
            return;
        }

        updateStatus(`Status: Dialing ${targetId}...`);
        
        // Play dial tone for caller (if not on iOS)
        if (!isIOS) playRingtoneSynth('classic', false);

        try {
            const stream = await getMediaStream();
            const fullPeerId = APP_PREFIX + targetId;
            
            currentCall = peer.call(fullPeerId, stream);
            addToHistory(targetId, "Outgoing");

            document.getElementById('btn-dial').style.display = 'none';
            document.getElementById('btn-hangup').style.display = 'block';

            currentCall.on('stream', (remoteStream) => {
                stopRingtone();
                updateStatus("Status: Connected");
                document.getElementById('remote-video').srcObject = remoteStream;
            });

            currentCall.on('close', () => {
                handleCallCleanup();
            });

        } catch (err) {
            stopRingtone();
            updateStatus("Status: Call Aborted.");
        }
    }

    // --- Inbound Call Interaction ---
    async function answerCall() {
        if (!incomingCallInstance) return;
        stopRingtone();
        document.getElementById('incoming-panel').style.display = 'none';
        updateStatus("Status: Connecting stream...");

        try {
            const stream = await getMediaStream();
            incomingCallInstance.answer(stream);
            currentCall = incomingCallInstance;
            
            const callerId = currentCall.peer.replace(APP_PREFIX, "");
            addToHistory(callerId, "Incoming (Answered)");

            document.getElementById('btn-dial').style.display = 'none';
            document.getElementById('btn-hangup').style.display = 'block';

            currentCall.on('stream', (remoteStream) => {
                updateStatus("Status: Connected");
                document.getElementById('remote-video').srcObject = remoteStream;
            });

            currentCall.on('close', () => {
                handleCallCleanup();
            });
        } catch (err) {
            handleCallCleanup();
        }
    }

    function rejectCall() {
        if (incomingCallInstance) {
            const callerId = incomingCallInstance.peer.replace(APP_PREFIX, "");
            addToHistory(callerId, "Missed / Rejected");
            incomingCallInstance.close();
        }
        stopRingtone();
        document.getElementById('incoming-panel').style.display = 'none';
        updateStatus("Status: Ready to receive/make calls.");
    }

    function hangUp() {
        if (currentCall) currentCall.close();
        handleCallCleanup();
    }

    function handleCallCleanup() {
        stopRingtone();
        if (currentCall) {
            currentCall.close();
            currentCall = null;
        }
        incomingCallInstance = null;
        
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('btn-dial').style.display = 'block';
        document.getElementById('btn-hangup').style.display = 'none';
        document.getElementById('incoming-panel').style.display = 'none';
        updateStatus("Status: Call Ended.");
    }

    function updateStatus(text) {
        document.getElementById('status-text').innerText = text;
    }

    // --- Custom Synthesizer Engine (Web Audio API) ---
    function playPlatformRingtone() {
        const selection = document.getElementById('ringtone-select').value;
        playRingtoneSynth(selection, true);
    }

    function playRingtoneSynth(style, isIncoming) {
        stopRingtone();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const triggerSequence = () => {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            let osc1 = audioCtx.createOscillator();
            let osc2 = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);

            switch(style) {
                case 'pulse':
                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(150, now);
                    osc1.frequency.exponentialRampToValueAtTime(800, now + 0.5);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                    osc1.start(now); osc1.stop(now + 0.5);
                    break;
                case 'beacon':
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(880, now);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                    osc1.start(now); osc1.stop(now + 1.2);
                    break;
                case 'chirp':
                    osc1.type = 'triangle';
                    osc1.frequency.setValueAtTime(1200, now);
                    osc1.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc1.start(now); osc1.stop(now + 0.3);
                    break;
                case 'melody':
                    const notes = [261.63, 329.63, 392.00, 523.25]; // C major chord step
                    notes.forEach((freq, idx) => {
                        let stepOsc = audioCtx.createOscillator();
                        let stepGain = audioCtx.createGain();
                        stepOsc.type = 'sine';
                        stepOsc.frequency.setValueAtTime(freq, now + (idx * 0.18));
                        stepGain.gain.setValueAtTime(0.1, now + (idx * 0.18));
                        stepGain.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.18) + 0.35);
                        stepOsc.connect(stepGain);
                        stepGain.connect(audioCtx.destination);
                        stepOsc.start(now + (idx * 0.18));
                        stepOsc.stop(now + (idx * 0.18) + 0.35);
                    });
                    break;
                case 'siren':
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(400, now);
                    osc1.frequency.linearRampToValueAtTime(800, now + 0.4);
                    osc1.frequency.linearRampToValueAtTime(400, now + 0.8);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.8);
                    osc1.start(now); osc1.stop(now + 0.8);
                    break;
                case 'digital':
                    osc1.type = 'square';
                    osc1.frequency.setValueAtTime(1000, now);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.setValueAtTime(0.001, now + 0.15);
                    osc1.start(now); osc1.stop(now + 0.15);
                    break;
                case 'harmonic':
                    osc1.type = 'sine'; osc2.type = 'sine';
                    osc1.frequency.setValueAtTime(329.63, now); // E4
                    osc2.frequency.setValueAtTime(493.88, now); // B4
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                    osc1.start(now); osc2.start(now);
                    osc1.stop(now + 1.8); osc2.stop(now + 1.8);
                    break;
                case 'marimba':
                    osc1.type = 'triangle';
                    osc1.frequency.setValueAtTime(659.25, now); // E5
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc1.start(now); osc1.stop(now + 0.25);
                    break;
                case 'bounce':
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(300, now);
                    osc1.frequency.setValueAtTime(600, now + 0.1);
                    osc1.frequency.setValueAtTime(450, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.setValueAtTime(0.1, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now + 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                    osc1.start(now); osc1.stop(now + 0.45);
                    break;
                case 'classic':
                default:
                    osc1.type = 'sine'; osc2.type = 'sine';
                    osc1.frequency.setValueAtTime(440, now);
                    osc2.frequency.setValueAtTime(480, now);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                    osc1.start(now); osc2.start(now);
                    osc1.stop(now + 1.2); osc2.stop(now + 1.2);
                    break;
            }
        };

        triggerSequence();
        ringtoneInterval = setInterval(triggerSequence, isIncoming ? 2200 : 3800);
    }

    function stopRingtone() {
        if (ringtoneInterval) {
            clearInterval(ringtoneInterval);
            ringtoneInterval = null;
        }
        if (audioCtx) {
            audioCtx.close().catch(() => {});
            audioCtx = null;
        }
    }

    // --- Storage Interface Functions ---
    function addContact() {
        const name = document.getElementById('contact-name').value.trim();
        const id = document.getElementById('contact-id').value.trim();

        if(!name || id.length !== 4 || isNaN(id)) {
            alert("Please enter a valid name and a 4-digit ID.");
            return;
        }

        contacts.push({ name, id });
        localStorage.setItem('phone_contacts', JSON.stringify(contacts));
        
        document.getElementById('contact-name').value = '';
        document.getElementById('contact-id').value = '';
        renderContacts();
    }

    function removeContact(index) {
        contacts.splice(index, 1);
        localStorage.setItem('phone_contacts', JSON.stringify(contacts));
        renderContacts();
    }

    function quickDial(id) {
        document.getElementById('target-id').value = id;
        startCall();
    }

    function addToHistory(id, type) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const matchingContact = contacts.find(c => c.id === id);
        const displayName = matchingContact ? `${matchingContact.name} (${id})` : `ID: ${id}`;
        
        callHistory.unshift({ displayName, type, time });
        if (callHistory.length > 20) callHistory.pop(); 
        localStorage.setItem('phone_history', JSON.stringify(callHistory));
        renderHistory();
    }

    function renderContacts() {
        const container = document.getElementById('contacts-list');
        container.innerHTML = contacts.length === 0 ? '<div style="font-size:0.8rem;color:#64748b;">No contacts saved.</div>' : '';
        contacts.forEach((c, index) => {
            container.innerHTML += `
                <div class="list-item">
                    <span><strong>${c.name}</strong> (${c.id})</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-call" onclick="quickDial('${c.id}')">Call</button>
                        <button class="btn-hangup" style="display:inline-block; padding: 4px 8px;" onclick="removeContact(${index})">X</button>
                    </div>
                </div>`;
        });
    }

    function renderHistory() {
        const container = document.getElementById('history-list');
        container.innerHTML = callHistory.length === 0 ? '<div style="font-size:0.8rem;color:#64748b;">No recent activity.</div>' : '';
        callHistory.forEach(h => {
            container.innerHTML += `
                <div class="list-item">
                    <span>${h.displayName} <br><small style="color:#64748b;">${h.type}</small></span>
                    <span style="font-size:0.75rem; color:#94a3b8;">${h.time}</span>
                </div>`;
        });
    }

    // --- Init ---
    initPeer();
    renderContacts();
    renderHistory();
</script>
</body>
</html>
